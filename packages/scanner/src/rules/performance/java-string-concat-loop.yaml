id: java-string-concat-loop
language: [java]
severity: medium
category: performance
pattern: "(?:for|while)\\s*\\([^)]*\\)\\s*\\{[^}]*(?:String\\s+\\w+\\s*\\+?=|\\w+\\s*\\+=\\s*(?:\"|String))"
message: "String concatenation with + inside loops creates a new StringBuilder and String object per iteration, resulting in O(n^2) allocations. Use a single StringBuilder declared outside the loop and append within it."
fix:
  bad: "for (String s : items) { result += s + \",\"; }"
  good: "StringBuilder sb = new StringBuilder(); for (String s : items) { sb.append(s).append(','); } String result = sb.toString();"
