id: php-xss
language: [php]
severity: high
category: security
pattern: "echo\\s+\\$_(GET|POST|REQUEST|COOKIE)|print\\s+\\$_(GET|POST|REQUEST)|<\\?=\\s*\\$_(GET|POST|REQUEST)"
message: "User input from $_GET, $_POST, or $_REQUEST is echoed directly without HTML escaping, enabling cross-site scripting (XSS). An attacker can inject JavaScript that runs in other users' browsers, stealing sessions or performing actions on their behalf. Always wrap output with htmlspecialchars($input, ENT_QUOTES, 'UTF-8') or use a template engine with auto-escaping enabled."
fix:
  bad: "echo $_GET['name'];"
  good: "echo htmlspecialchars($_GET['name'], ENT_QUOTES, 'UTF-8');"
