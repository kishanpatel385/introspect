id: python-django-secret-key
language: [python]
severity: critical
category: security
pattern: "SECRET_KEY\\s*=\\s*['\"][^'\"]{10,}['\"]"
message: "Django's SECRET_KEY is hardcoded in the source code. This key is used for cryptographic signing of sessions, CSRF tokens, and password reset tokens. If exposed, an attacker can forge any of these tokens. Move SECRET_KEY to an environment variable and ensure it is randomly generated."
fix:
  bad: "SECRET_KEY = 'my-super-secret-key-12345'"
  good: "SECRET_KEY = os.environ['DJANGO_SECRET_KEY']"
