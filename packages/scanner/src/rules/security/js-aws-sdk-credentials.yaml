id: js-aws-sdk-credentials
language: [javascript, typescript]
severity: critical
category: security
pattern: "new\\s+(?:AWS\\.)?(?:S3|DynamoDB|SQS|SNS|Lambda|EC2|IAM)\\s*\\(\\s*\\{[^}]*(?:accessKeyId|secretAccessKey)\\s*:"
message: "Hardcoding AWS credentials in the SDK client configuration embeds them in source code. They will be exposed through version control and cannot be rotated without code changes. Use the AWS credential provider chain (environment variables, IAM roles, or shared credentials file)."
fix:
  bad: "new S3({ accessKeyId: 'AKIA...', secretAccessKey: 'abc...' })"
  good: "new S3() // Uses default credential provider chain"
