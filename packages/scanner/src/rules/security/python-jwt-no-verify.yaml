id: python-jwt-no-verify
language: [python]
severity: critical
category: security
pattern: "jwt\\.decode\\s*\\(.*(?:verify\\s*=\\s*False|options\\s*=\\s*\\{.*verify.*False)"
message: "Decoding JWT tokens without signature verification allows token forgery. An attacker can create arbitrary tokens to impersonate any user or escalate privileges. Always verify the JWT signature and validate claims like exp, iss, and aud."
fix:
  bad: "jwt.decode(token, options={'verify_signature': False})"
  good: "jwt.decode(token, secret, algorithms=['HS256'])"
