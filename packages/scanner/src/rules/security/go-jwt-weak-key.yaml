id: go-jwt-weak-key
language: [go]
severity: critical
category: security
pattern: "jwt\\.(?:NewWithClaims|New)\\s*\\(\\s*jwt\\.SigningMethodHS256.*\\).*Sign.*\\[\\]byte\\s*\\(\\s*\"[^\"]{1,20}\"\\s*\\)"
message: "JWT tokens signed with short or weak secrets can be brute-forced. An attacker who discovers the secret can forge any token, gaining access to any account. Use a key of at least 256 bits (32 bytes) for HMAC, or switch to RSA/ECDSA key pairs."
fix:
  bad: "token.SignedString([]byte(\"secret\"))"
  good: "token.SignedString([]byte(os.Getenv(\"JWT_SECRET\"))) // 32+ byte random key"
