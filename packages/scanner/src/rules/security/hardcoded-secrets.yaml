id: hardcoded-secrets
language: []
severity: critical
category: security
pattern: "(api[_-]?key|api[_-]?secret|password|secret[_-]?key|access[_-]?token|private[_-]?key)\\s*[=:]\\s*['\"][A-Za-z0-9+/=_\\-]{16,}"
message: "A secret (API key, password, or token) is hardcoded directly in source code. This means anyone with repository access can see the secret, and it will persist in git history even if removed later. Move all secrets to environment variables or a dedicated secret manager like Vault or AWS Secrets Manager."
fix:
  bad: "const API_KEY = 'sk_live_abc123def456ghi789'"
  good: "const API_KEY = process.env.API_KEY"
