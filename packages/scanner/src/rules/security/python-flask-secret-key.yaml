id: python-flask-secret-key
language: [python]
severity: critical
category: security
pattern: "app\\.(?:secret_key|config\\[.SECRET_KEY.\\])\\s*=\\s*['\"][^'\"]{5,}['\"]"
message: "Flask's SECRET_KEY is hardcoded in the source. This key signs session cookies, CSRF tokens, and other security-sensitive data. If exposed, an attacker can forge sessions and impersonate any user. Move SECRET_KEY to an environment variable and generate it with os.urandom(32)."
fix:
  bad: "app.secret_key = 'my-development-key'"
  good: "app.secret_key = os.environ['FLASK_SECRET_KEY']"
