id: docker-secret-env
language: [dockerfile]
severity: critical
category: security
pattern: "ENV\\s+(?:\\w*(?:PASSWORD|SECRET|KEY|TOKEN|CREDENTIAL|AUTH)\\w*)\\s*="
message: "Storing secrets in Docker ENV instructions bakes them into the image layer. Anyone with access to the image can extract the secret using docker inspect or docker history. Use Docker secrets, build-time secrets (--mount=type=secret), or runtime environment variables instead."
fix:
  bad: "ENV DB_PASSWORD=mysecretpassword"
  good: "# Pass at runtime: docker run -e DB_PASSWORD=$DB_PASSWORD"
