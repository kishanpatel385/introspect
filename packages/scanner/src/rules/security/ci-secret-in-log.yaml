id: ci-secret-in-log
language: []
severity: critical
category: security
pattern: "echo\\s+.*\\$\\{?(?:secrets?|PASSWORD|TOKEN|KEY|CREDENTIAL|API_KEY)"
message: "Echoing secret variables in CI/CD pipelines exposes them in build logs. CI logs are often accessible to all team members and may be stored long-term. Most CI systems mask secrets automatically, but echo can bypass this protection. Remove debug echo statements that output secret values."
fix:
  bad: "echo \"Using token: ${{ secrets.API_TOKEN }}\""
  good: "# Never echo secrets. Use: echo \"Token is configured\" to verify existence"
