id: python-hardcoded-password
language: [python]
severity: critical
category: security
pattern: "(?:password|passwd|pwd|secret|api_key|apikey|token|auth)\\s*=\\s*['\"][^'\"]{8,}['\"]"
message: "Hardcoded credentials in source code are exposed to anyone with repository access and cannot be rotated without code changes. If the repository is leaked or public, all systems using these credentials are immediately compromised. Store credentials in environment variables or a secrets manager."
fix:
  bad: "password = 'my-secret-password-123'"
  good: "password = os.environ['DB_PASSWORD']"
