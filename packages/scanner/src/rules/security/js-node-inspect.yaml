id: js-node-inspect
language: [javascript, typescript]
severity: high
category: security
pattern: "--inspect|--inspect-brk|node\\s+--debug"
message: "Leaving Node.js inspector/debugger flags enabled in production exposes a debugging port that allows arbitrary code execution. An attacker who can access the debug port can execute any JavaScript, read memory, and control the process. Remove debug flags from production start scripts."
fix:
  bad: "node --inspect=0.0.0.0:9229 app.js"
  good: "node app.js"
