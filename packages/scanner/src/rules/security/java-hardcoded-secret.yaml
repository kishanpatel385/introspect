id: java-hardcoded-secret
language: [java]
severity: critical
category: security
pattern: "(?:password|secret|apiKey|api_key|token|credential|auth)\\s*=\\s*\"[^\"]{8,}\""
message: "Hardcoded credentials in Java source code are exposed through decompilation and version control. Unlike interpreted languages, compiled Java class files are easily decompiled to reveal string constants. Store credentials in environment variables, a secrets manager, or encrypted configuration files."
fix:
  bad: "String apiKey = \"sk-live-12345abcdef\";"
  good: "String apiKey = System.getenv(\"API_KEY\");"
