id: general-cors-credentials
language: []
severity: high
category: security
pattern: "Access-Control-Allow-Credentials\\s*[=:]\\s*['\"]?true.*Access-Control-Allow-Origin\\s*[=:]\\s*['\"]?\\*|credentials\\s*:\\s*true.*origin\\s*:\\s*['\"]?\\*"
message: "Combining Access-Control-Allow-Credentials:true with Access-Control-Allow-Origin:* is a dangerous CORS misconfiguration (browsers block this, but some implementations reflect the Origin header). This allows any website to make authenticated requests. Never use wildcard origin with credentials."
fix:
  bad: "cors({ origin: '*', credentials: true })"
  good: "cors({ origin: 'https://app.example.com', credentials: true })"
